name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode 26
      run: |
        sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
        xcodebuild -version

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.100'

    - name: Install MAUI workload
      run: dotnet workload install maui-ios

    - name: Restore dependencies
      run: dotnet restore TreninkovyPlanovac.csproj -p:TargetFrameworks=net9.0-ios

    - name: Build iOS (no signing)
      run: dotnet build TreninkovyPlanovac.csproj -f net9.0-ios -c Release -p:_RequireCodeSigning=false -p:TargetFrameworks=net9.0-ios

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ios-build
        path: bin/Release/net9.0-ios/
        retention-days: 7
